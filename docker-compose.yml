services:
  postgres:
    image: postgres:16-alpine
    container_name: zivo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zivo}
      POSTGRES_USER: ${POSTGRES_USER:-zivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/seed_atlas.sql:/docker-entrypoint-initdb.d/02-seed_atlas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zivo} -d ${POSTGRES_DB:-zivo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zivo-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.20
    container_name: zivo-chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "false"
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_AUTH_TOKEN}
      CHROMA_SERVER_AUTHN_PROVIDER: chromadb.auth.token_authn.TokenAuthenticationServerProvider
      CHROMA_AUTH_TOKEN_TRANSPORT_HEADER: Authorization
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; req = urllib.request.Request('http://127.0.0.1:8000/api/v1/heartbeat', headers={'Authorization': f'Bearer {os.environ[\"CHROMA_SERVER_AUTHN_CREDENTIALS\"]}'}); urllib.request.urlopen(req, timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: zivo-ollama
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: zivo-litellm
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config=/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zivo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zivo}
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      VERTEXAI_PROJECT: ${VERTEXAI_PROJECT:-}
      VERTEXAI_LOCATION: ${VERTEXAI_LOCATION:-us-central1}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: zivo
    depends_on:
      litellm:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      WEBUI_NAME: ${WEBUI_NAME:-Zivo Workspace}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      VECTOR_DB: chroma
      CHROMA_HTTP_HOST: chroma
      CHROMA_HTTP_PORT: "8000"
      CHROMA_HTTP_HEADERS: "Authorization=Bearer ${CHROMA_AUTH_TOKEN}"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - open-webui-data:/app/backend/data
      - ./branding/logo.png:/app/backend/open_webui/static/logo.png:ro
      - ./branding/logo.png:/app/backend/open_webui/static/splash.png:ro
      - ./branding/logo.png:/app/backend/open_webui/static/splash-dark.png:ro
      - ./branding/favicon.png:/app/backend/open_webui/static/favicon.png:ro
      - ./branding/favicon.png:/app/backend/open_webui/static/favicon-96x96.png:ro
      - ./branding/favicon.png:/app/backend/open_webui/static/favicon-dark.png:ro
      - ./branding/favicon.png:/app/backend/open_webui/static/apple-touch-icon.png:ro
      - ./branding/favicon.png:/app/backend/open_webui/static/web-app-manifest-192x192.png:ro
      - ./branding/favicon.png:/app/backend/open_webui/static/web-app-manifest-512x512.png:ro
      - ./branding/favicon.ico:/app/backend/open_webui/static/favicon.ico:ro
      - ./branding/favicon.svg:/app/backend/open_webui/static/favicon.svg:ro
      - ./branding/logo.png:/app/build/static/logo.png:ro
      - ./branding/logo.png:/app/build/static/splash.png:ro
      - ./branding/logo.png:/app/build/static/splash-dark.png:ro
      - ./branding/favicon.png:/app/build/favicon.png:ro
      - ./branding/favicon.png:/app/build/static/favicon.png:ro
      - ./branding/favicon.png:/app/build/static/favicon-96x96.png:ro
      - ./branding/favicon.png:/app/build/static/favicon-dark.png:ro
      - ./branding/favicon.png:/app/build/static/apple-touch-icon.png:ro
      - ./branding/favicon.png:/app/build/static/web-app-manifest-192x192.png:ro
      - ./branding/favicon.png:/app/build/static/web-app-manifest-512x512.png:ro
      - ./branding/favicon.ico:/app/build/static/favicon.ico:ro
      - ./branding/favicon.svg:/app/build/static/favicon.svg:ro
    ports:
      - "127.0.0.1:3000:8080"
    restart: unless-stopped

  atlas-api:
    build: ./atlas-api
    container_name: zivo-atlas-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-zivo}
      POSTGRES_USER: ${POSTGRES_USER:-zivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_EMAIL_MODEL: ${ATLAS_EMAIL_MODEL:-Zivo Fast (GPT-5 Mini)}
      N8N_WEBHOOK_BASE_URL: http://n8n:5678/webhook
    ports:
      - "127.0.0.1:8088:8000"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: zivo-n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-zivo}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-zivo}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      EXECUTIONS_MODE: queue
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL}
      N8N_PATH: /n8n/
      N8N_PROXY_HOPS: "1"
      N8N_HOST: zivo.tafarax.com
      N8N_PROTOCOL: https
      N8N_SECURE_COOKIE: "true"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPS_DIGEST_WEBHOOK_URL: ${OPS_DIGEST_WEBHOOK_URL:-}
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    restart: unless-stopped

  n8n-worker:
    image: n8nio/n8n:latest
    container_name: zivo-n8n-worker
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      n8n:
        condition: service_started
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-zivo}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-zivo}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      QUEUE_HEALTH_CHECK_ACTIVE: "true"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPS_DIGEST_WEBHOOK_URL: ${OPS_DIGEST_WEBHOOK_URL:-}
    restart: unless-stopped

  evidence:
    image: node:20-alpine
    container_name: zivo-evidence
    working_dir: /usr/src/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-zivo}
      POSTGRES_USER: ${POSTGRES_USER:-zivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EVIDENCE_SOURCE__zivo_db__host: postgres
      EVIDENCE_SOURCE__zivo_db__port: "5432"
      EVIDENCE_SOURCE__zivo_db__database: ${POSTGRES_DB:-zivo}
      EVIDENCE_SOURCE__zivo_db__user: ${POSTGRES_USER:-zivo}
      EVIDENCE_SOURCE__zivo_db__password: ${POSTGRES_PASSWORD}
    command:
      - sh
      - -c
      - |
        npm install --legacy-peer-deps --ignore-scripts &&
        echo '{"type":"module"}' > node_modules/@evidence-dev/evidence/template/package.json &&
        grep -q "noExternal" node_modules/@evidence-dev/evidence/template/vite.config.js || sed -i "s|external: \['@evidence-dev/db-orchestrator|noExternal: ['@evidence-dev/component-utilities'],external: ['@evidence-dev/db-orchestrator|" node_modules/@evidence-dev/evidence/template/vite.config.js &&
        grep -q "fallback" node_modules/@evidence-dev/evidence/template/svelte.config.js || sed -i "s/strict: false/strict: false, fallback: 'index.html'/" node_modules/@evidence-dev/evidence/template/svelte.config.js &&
        grep -q "handleHttpError" node_modules/@evidence-dev/evidence/template/svelte.config.js || sed -i "s/files: {/prerender: { handleHttpError: function(e) { console.warn('[prerender]', e.path, e.message); } },\n\t\tfiles: {/" node_modules/@evidence-dev/evidence/template/svelte.config.js &&
        npm run build &&
        npx serve@latest build -l 3000 -s
    volumes:
      - ./evidence:/usr/src/app
      - evidence-node-modules:/usr/src/app/node_modules
    ports:
      - "127.0.0.1:3100:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  open-webui-data:
  postgres-data:
  chroma-data:
  ollama-data:
  n8n-data:
  redis-data:
  evidence-node-modules:
